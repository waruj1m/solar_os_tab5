[platformio]
default_envs = waveshare_esp32_s3_rlcd_4_2

[env]
framework = espidf
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = partitions.csv
extra_scripts = pre:scripts/platformio_solaros_flavor.py

[env:waveshare_esp32_s3_rlcd_4_2]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = waveshare_esp32_s3_rlcd_4_2
board_build.cmake_extra_args = -DSOLAR_OS_BOARD=waveshare_esp32_s3_rlcd_4_2

[env:esp32_s3_devkitc1_n16r8]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc1-n16r8
board_build.cmake_extra_args = -DSOLAR_OS_BOARD=esp32_s3_devkitc1_n16r8

[env:m5stack_tab5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = m5stack-tab5-p4
board_build.cmake_extra_args = -DSOLAR_OS_BOARD=m5stack_tab5
board_build.sdkconfig_path = sdkconfig.defaults.tab5
