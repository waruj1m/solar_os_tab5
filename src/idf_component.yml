dependencies:
  idf:
    version: ">=5.5.0"
  skuodi/libssh2_esp:
    version: "~1.1.0"
  espressif/esp_codec_dev:
    version: "~1.4.0"
  # ESP32-P4 has no radio: esp_wifi_remote + esp_hosted provide the standard
  # esp_wifi/esp_netif API backed by the on-board ESP32-C6 over SDIO.
  espressif/esp_wifi_remote:
    version: "*"
    rules:
      - if: "target in [esp32p4]"
  espressif/esp_hosted:
    version: "*"
    rules:
      - if: "target in [esp32p4]"
  espressif/esp_lcd_ili9881c:
    version: "^1.0.0"
    rules:
      - if: "target in [esp32p4]"
  # Tab5 units in the wild ship one of two panel/touch pairings, detected
  # at runtime the same way M5Stack's own firmware does (GT911 present ->
  # ILI9881C panel; else probe touch address 0x55 and read its firmware
  # version -> ST7121 or ST7123 panel).
  espressif/esp_lcd_st7121:
    version: "^1.0.1"
    rules:
      - if: "target in [esp32p4]"
  espressif/esp_lcd_st7123:
    version: "^1.0.2"
    rules:
      - if: "target in [esp32p4]"
  espressif/usb_host_hid:
    version: "^1.0.3"
    rules:
      - if: "target in [esp32p4]"
  espressif/esp_lcd_touch_gt911:
    version: "^1.1.1"
    rules:
      - if: "target in [esp32p4]"
  # Paired with the ST7121/ST7123 panel revisions above; same touch chip
  # protocol regardless of which of the two panels is present.
  espressif/esp_lcd_touch_st7123:
    version: "^1.0.2"
    rules:
      - if: "target in [esp32p4]"
