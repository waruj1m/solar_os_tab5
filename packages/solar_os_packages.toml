[groups.core]
members = [
  "core_runtime",
  "core_shell",
  "core_fs_commands",
  "service_wifi",
  "service_ble",
  "service_sd",
  "service_audio",
  "service_gpio",
  "service_i2c",
  "service_json",
  "service_crypto",
  "service_uart",
  "service_battery",
  "service_rtc",
  "service_sensors",
  "service_adc",
  "service_pwm",
  "job_bridge",
  "job_log",
  "job_shell",
  "job_batmon",
  "job_daq",
]

[groups.audio]
members = ["service_audio", "app_aplay", "app_arecord"]
triggers = ["app_aplay", "app_arecord"]

[groups.net]
members = [
  "service_wifi",
  "app_ssh",
  "app_scp",
  "app_curl",
  "app_web",
  "app_chat",
  "job_httpd",
  "job_chatd",
  "job_slip",
  "job_ntp_sync",
]
triggers = [
  "app_ssh",
  "app_scp",
  "app_curl",
  "app_web",
  "app_chat",
  "job_httpd",
  "job_chatd",
  "job_slip",
  "job_ntp_sync",
]
sources = [
  "services/solar_os_chat.c",
  "services/solar_os_mqtt.c",
  "services/solar_os_net.c",
  "services/solar_os_scp.c",
  "services/solar_os_ssh.c",
  "services/solar_os_ssh_keys.c",
  "services/solar_os_ssh_transport.c",
]
requires = ["esp_http_server", "mbedtls", "mqtt", "stb_image", "webp_decoder"]

[groups.media]
members = ["app_view"]
triggers = ["app_view"]

[groups.games]
members = ["app_invaders"]
triggers = ["app_invaders"]

[groups.python]
members = ["app_python"]
triggers = ["app_python"]

[groups.lua]
members = ["app_lua"]
triggers = ["app_lua"]

[groups.utils]
members = [
  "app_clock",
  "app_com",
  "app_edit",
  "app_less",
  "app_reader",
  "app_files",
  "app_notes",
  "app_plot",
  "app_sheet",
]
triggers = [
  "app_clock",
  "app_com",
  "app_edit",
  "app_less",
  "app_reader",
  "app_files",
  "app_notes",
  "app_plot",
  "app_sheet",
]

